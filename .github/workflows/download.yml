name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube 视频链接'
        required: true
        type: string
      type:
        description: '下载类型'
        required: true
        default: 'video'
        type: choice
        options:
          - video
          - audio
          - subtitle
      quality:
        description: '画质/音质 (video: best/1080p/720p/480p, audio: 192/128/64)'
        required: false
        default: 'best'
        type: string
      upload-folder:
        description: '阿里云盘上传目录（名称，如 "YouTube下载"）'
        required: false
        default: ''
        type: string

concurrency:
  group: youtube-downloader-${{ github.event.inputs.url }}
  cancel-in-progress: false

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 检查 ffmpeg 并安装 deno
        run: |
          which ffmpeg || sudo apt-get update && sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1
          which deno || (curl -fsSL https://deno.land/install.sh | sh 2>&1 | tail -3)
          echo "$HOME/.deno/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.deno/bin:$PATH"
          deno --version | head -1

      - name: 随机延迟 — 模拟人类行为，降低被限流概率
        run: sleep $((5 + RANDOM % 11))

      - name: 执行下载
        env:
          ALIYUNDRIVE_REFRESH_TOKEN: ${{ secrets.ALIYUNDRIVE_REFRESH_TOKEN }}
          ALIYUNDRIVE_PARENT_ID: ${{ secrets.ALIYUNDRIVE_PARENT_ID }}
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          python download.py \
            --url "${{ inputs.url }}" \
            --type "${{ inputs.type }}" \
            --quality "${{ inputs.quality }}" \
            --upload-folder "${{ inputs.upload-folder || '' }}" \
            --json
