name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube 视频链接'
        required: true
        type: string
      type:
        description: '下载类型'
        required: true
        default: 'video'
        type: choice
        options:
          - video
          - audio
          - subtitle
      quality:
        description: '画质/音质 (video: best/1080p/720p/480p, audio: 192/128/64)'
        required: false
        default: 'best'
        type: string
      upload-folder:
        description: '阿里云盘上传目录（名称，如 "YouTube下载"）'
        required: false
        default: ''
        type: string

concurrency:
  group: youtube-downloader-${{ github.event.inputs.url }}
  cancel-in-progress: false

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 检查 ffmpeg 并安装 deno（新版 yt-dlp 需要）
        run: |
          which ffmpeg || sudo apt-get update && sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1
          # 新版 yt-dlp 需要 JavaScript 运行时
          which deno || (curl -fsSL https://deno.land/install.sh | sh 2>&1 | tail -3)
          export DENO_DIR="$HOME/.cache/deno"
          deno --version | head -1

      - name: 执行下载（音频用 yt-dlp 命令行直接处理）
        if: inputs.type == 'audio'
        env:
          ALIYUNDRIVE_REFRESH_TOKEN: ${{ secrets.ALIYUNDRIVE_REFRESH_TOKEN }}
          ALIYUNDRIVE_PARENT_ID: ${{ secrets.ALIYUNDRIVE_PARENT_ID }}
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
          YT_URL: ${{ inputs.url }}
        run: |
          python download_audio_cli.py "${{ inputs.url }}" "${{ inputs.quality }}"

      - name: 执行下载（视频/字幕用 Python 脚本）
        if: inputs.type == 'video' || inputs.type == 'subtitle'
        env:
          ALIYUNDRIVE_REFRESH_TOKEN: ${{ secrets.ALIYUNDRIVE_REFRESH_TOKEN }}
          ALIYUNDRIVE_PARENT_ID: ${{ secrets.ALIYUNDRIVE_PARENT_ID }}
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          python download.py \
            --url "${{ inputs.url }}" \
            --type "${{ inputs.type }}" \
            --quality "${{ inputs.quality }}" \
            --upload-folder "${{ inputs.upload-folder || '' }}" \
            --json
