name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube 视频链接'
        required: true
        type: string
      type:
        description: '下载类型'
        required: true
        default: 'video'
        type: choice
        options:
          - video
          - audio
          - subtitle
      quality:
        description: '画质/音质 (video: best/1080p/720p/480p, audio: 192/128/64)'
        required: false
        default: 'best'
        type: string
      upload-folder:
        description: '阿里云盘上传目录（名称，如 "YouTube下载"）'
        required: false
        default: ''
        type: string

concurrency:
  group: youtube-downloader-${{ github.event.inputs.url }}
  cancel-in-progress: false

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 检查 ffmpeg
        run: |
          which ffmpeg || sudo apt-get update && sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: 解码 Cookie 文件（base64 -> 纯文本）
        env:
          YT_B64: ${{ secrets.YT_COOKIES_B64 }}
        run: |
          echo "$YT_B64" | base64 -d > /tmp/yt_cookies.txt
          echo "Cookie 已解码: $(wc -l < /tmp/yt_cookies.txt) 行, $(wc -c < /tmp/yt_cookies.txt) 字节"

      - name: 执行下载
        env:
          ALIYUNDRIVE_REFRESH_TOKEN: ${{ secrets.ALIYUNDRIVE_REFRESH_TOKEN }}
          ALIYUNDRIVE_PARENT_ID: ${{ secrets.ALIYUNDRIVE_PARENT_ID }}
          YT_COOKIE_FILE: /tmp/yt_cookies.txt
        run: |
          python download.py \
            --url "${{ inputs.url }}" \
            --type "${{ inputs.type }}" \
            --quality "${{ inputs.quality }}" \
            --upload-folder "${{ inputs.upload-folder || '' }}" \
            --json
